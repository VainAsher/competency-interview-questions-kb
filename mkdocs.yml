# Generated by scripts/build_site.py — do not edit by hand.
site_name: UK & EU Competency-Based Interview Knowledge Base
site_description: Evidence-based, source-cited reference on competency-based interviews in the UK & EU — frameworks, question banks, answer techniques, and assessment best practice for candidates and interviewers.
docs_dir: docs
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
markdown_extensions:
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
plugins:
  - search
nav:
  - Home: index.md
  - "Tier 1 — Category foundations":
      - "Competency-Based Interviewing: Competency Families & Question Mapping": 01-competencies/competencies-foundation.md
      - "Answer Frameworks & Techniques: STAR and Beyond": 02-techniques/techniques-foundation.md
      - "UK Competency Frameworks: The Landscape": 03-uk-frameworks/uk-frameworks-foundation.md
      - "EU Competency Frameworks: EPSO & the EU Institutions": 04-eu-frameworks/eu-frameworks-foundation.md
      - "Interview Formats & Assessment Methods": 05-formats/formats-foundation.md
      - "Interview Best Practice: Preparation, Pitfalls & Scoring Insight": 06-best-practice/best-practice-foundation.md
